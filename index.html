<!DOCTYPE html>
<!-- Original: https://codepen.io/boudra/pen/raErwP -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Calendar</title>

    <style>
        :root {
            /* Change this value to resize the calendar */
            --calendar-width: 300px;

            --pink: #fae9f1;
            --text: #000000;
            --faded-text: #cccccc;
            --arrow-background: #f3f3f3;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: sans-serif;
        }

        body {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 6px;
        }

        #calendar {
            position: relative;
            width: min(100%, var(--calendar-width));
            height: 306px;
            margin: 0 auto;
            font-size: 11px;
        }

        table {
            position: absolute;
            inset: 0;
            width: 100%;
            table-layout: fixed;
            border-collapse: separate;
            border-spacing: 0;
            overflow: hidden;
            background-color: #ffffff;
            border: 1px solid var(--pink);
            border-radius: 4px;
            box-shadow: 1px 1px 0 var(--pink);
        }

        th,
        td {
            padding: 0;
            text-align: center;
            background-color: #ffffff;
        }

        /* Month and year header */
        th.month {
            position: relative;
            height: 40px;
            padding: 0 38px;
            background-color: var(--pink);
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
            line-height: 40px;
            white-space: nowrap;
        }

        .year {
            display: inline;
            color: var(--text);
            font-size: inherit;
            font-weight: inherit;
            line-height: inherit;
            text-shadow: none;
        }

        /* Previous and next arrows */
        .boto-next,
        .boto-prev {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            padding: 0;
            border: none;
            border-radius: 0;
            background-color: var(--arrow-background);
            color: #ffffff;
            font-family: sans-serif;
            font-size: 13px;
            font-weight: 700;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
        }

        .boto-prev {
            left: 8px;
        }

        .boto-next {
            right: 8px;
        }

        /* Weekday headings */
        th.day-header {
            height: 34px;
            background-color: #ffffff;
            color: var(--text);
            font-size: 11px;
            font-weight: 700;
        }

        /* Calendar dates */
        td {
            height: 38px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        td > span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 38px;
            padding: 0;
            color: var(--text);
            font-size: 11px;
            font-weight: 400;
            border: 1px solid transparent;
            transition: border 0.3s ease;
        }

        /* Current date */
        td.avui > span {
            background-color: var(--pink);
            color: var(--text);
            font-weight: 700;
        }

        /* Dates outside the current month */
        td.fora > span {
            color: var(--faded-text);
            opacity: 1;
        }

        table.inactiu {
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="calendar"></div>

    <script>
        var months = [
            "JANUARY",
            "FEBRUARY",
            "MARCH",
            "APRIL",
            "MAY",
            "JUNE",
            "JULY",
            "AUGUST",
            "SEPTEMBER",
            "OCTOBER",
            "NOVEMBER",
            "DECEMBER"
        ];

        var days_abr = [
            "Su",
            "Mo",
            "Tu",
            "We",
            "Th",
            "Fr",
            "Sa"
        ];

        Number.prototype.pad = function (num) {
            var str = "";

            for (
                var i = 0;
                i < num - this.toString().length;
                i++
            ) {
                str += "0";
            }

            return str + this.toString();
        };

        function calendar(widget, data) {
            var original =
                widget.getElementsByClassName("actiu")[0];

            if (typeof original === "undefined") {
                original = document.createElement("table");

                original.setAttribute(
                    "data-actual",
                    data.getFullYear() +
                        "/" +
                        data.getMonth().pad(2) +
                        "/" +
                        data.getDate().pad(2)
                );

                widget.appendChild(original);
            }

            var diff =
                data -
                new Date(
                    original.getAttribute("data-actual")
                );

            diff = new Date(diff).getMonth();

            var e = document.createElement("table");

            e.className =
                diff === 0
                    ? "amagat-esquerra"
                    : "amagat-dreta";

            widget.appendChild(e);

            e.setAttribute(
                "data-actual",
                data.getFullYear() +
                    "/" +
                    data.getMonth().pad(2) +
                    "/" +
                    data.getDate().pad(2)
            );

            var fila = document.createElement("tr");
            var titol = document.createElement("th");

            titol.setAttribute("colspan", 7);
            titol.setAttribute("class", "month");

            var boto_prev =
                document.createElement("button");

            boto_prev.className = "boto-prev";
            boto_prev.innerHTML = "&#9666;";
            boto_prev.setAttribute(
                "aria-label",
                "Previous month"
            );

            var boto_next =
                document.createElement("button");

            boto_next.className = "boto-next";
            boto_next.innerHTML = "&#9656;";
            boto_next.setAttribute(
                "aria-label",
                "Next month"
            );

            titol.appendChild(boto_prev);

            titol.appendChild(
                document.createElement("span")
            ).innerHTML =
                months[data.getMonth()] +
                ' <span class="year">' +
                data.getFullYear() +
                "</span>";

            titol.appendChild(boto_next);

            boto_prev.onclick = function () {
                data.setMonth(data.getMonth() - 1);
                calendar(widget, data);
            };

            boto_next.onclick = function () {
                data.setMonth(data.getMonth() + 1);
                calendar(widget, data);
            };

            fila.appendChild(titol);
            e.appendChild(fila);

            fila = document.createElement("tr");

            for (var i = 1; i < 7; i++) {
                fila.innerHTML +=
                    '<th class="day-header">' +
                    days_abr[i] +
                    "</th>";
            }

            fila.innerHTML +=
                '<th class="day-header">' +
                days_abr[0] +
                "</th>";

            e.appendChild(fila);

            var inici_mes = new Date(
                data.getFullYear(),
                data.getMonth(),
                -1
            ).getDay();

            var actual = new Date(
                data.getFullYear(),
                data.getMonth(),
                -inici_mes
            );

            for (var s = 0; s < 6; s++) {
                var fila = document.createElement("tr");

                for (var d = 1; d < 8; d++) {
                    var cela =
                        document.createElement("td");

                    var span =
                        document.createElement("span");

                    cela.appendChild(span);
                    span.innerHTML = actual.getDate();

                    if (
                        actual.getMonth() !==
                        data.getMonth()
                    ) {
                        cela.className = "fora";
                    }

                    if (
                        data.getDate() ===
                            actual.getDate() &&
                        data.getMonth() ===
                            actual.getMonth() &&
                        data.getFullYear() ===
                            actual.getFullYear()
                    ) {
                        cela.className = "avui";
                    }

                    actual.setDate(actual.getDate() + 1);
                    fila.appendChild(cela);
                }

                e.appendChild(fila);
            }

            setTimeout(function () {
                e.className = "actiu";

                original.className +=
                    diff === 0
                        ? " amagat-dreta"
                        : " amagat-esquerra";
            }, 20);

            original.className = "inactiu";

            setTimeout(function () {
                var inactius =
                    document.getElementsByClassName(
                        "inactiu"
                    );

                while (inactius.length > 0) {
                    inactius[0].remove();
                }
            }, 1000);
        }

        calendar(
            document.getElementById("calendar"),
            new Date()
        );
    </script>
</body>
</html>
